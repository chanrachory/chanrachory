name: Update Repo List

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@master
        with:
          comment_tag_name: "repos" # វានឹងស្វែងរក START_SECTION:repos ដោយស្វ័យប្រវត្តិ
          feed_list: "https://github.com/chanrachory.atom"
