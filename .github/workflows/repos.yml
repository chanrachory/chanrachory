name: Update Repo List
description: Automate updates to the repository list in the README file using a scheduled or manual trigger.

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.0.0
      - uses: gautamkrishnar/blog-post-workflow@v1.0.0
        with:
          feed_list: "https://github.com/chanrachory.atom"
